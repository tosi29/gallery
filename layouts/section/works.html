<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; margin:0; padding:2rem; background:#0f0f14; color:#f5f5f8; }
    .wrap { max-width: 1100px; margin:0 auto; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap:1rem; }
    .card { background:#1a1a22; border:1px solid #2a2a36; border-radius:12px; overflow:hidden; }
    img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; }
    .body { padding:.8rem 1rem 1rem; }
    .type { color:#7dd3fc; font-size:.8rem; }
    .sum { color:#b9b9c7; font-size:.9rem; }
    a { color:inherit; text-decoration:none; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>{{ .Title }}</h1>
    <div class="grid">
      {{ range .Pages.ByDate.Reverse }}
        <article class="card">
          <a href="{{ .RelPermalink }}">
            {{ with .Params.cover }}<img src="{{ . }}" alt="{{ $.Title }}" />{{ end }}
            <div class="body">
              <div class="type">{{ .Params.type }}</div>
              <h2>{{ .Title }}</h2>
              <p class="sum">{{ .Params.summary }}</p>
            </div>
          </a>
        </article>
      {{ end }}
    </div>
  </main>
</body>
</html>

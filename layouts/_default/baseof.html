<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ site.Title }}</title>
  <style>
    :root { --bg:#0f0f14; --card:#1a1a22; --text:#f5f5f8; --muted:#b9b9c7; --accent:#6fd3ff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif,system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); }
    a { color: inherit; text-decoration: none; }
    header, main, footer { max-width: 1100px; margin: 0 auto; padding: 1.25rem; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 1rem; }
    .card { background:var(--card); border-radius:16px; overflow:hidden; border:1px solid #2a2a36; }
    .card img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; }
    .card-body { padding: .85rem 1rem 1rem; }
    .badge { font-size:.75rem; color:var(--accent); }
    .summary { color:var(--muted); font-size:.9rem; }
    .work-cover { width:100%; border-radius:12px; border:1px solid #2a2a36; }
    .interactive-wrap { margin-top:1rem; background:#0a0a0f; border:1px solid #2a2a36; border-radius:12px; overflow:hidden; }
    canvas { width:100%; height:auto; display:block; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">{{ site.Title }}</a></h1>
    <p style="color:var(--muted)">{{ site.Params.description }}</p>
  </header>
  <main>{{ block "main" . }}{{ end }}</main>
  <footer><small style="color:var(--muted)">Built with Hugo</small></footer>
</body>
</html>
